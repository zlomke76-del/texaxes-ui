<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Tex Axes favicon</title>
  <desc id="desc">Dark navy rounded square with a warm orange crossed-axes mark and subtle TX monogram geometry.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E1A2B"/>
      <stop offset="100%" stop-color="#07111E"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDBA74"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#bg)"/>

  <!-- crossed handles -->
  <g filter="url(#shadow)" stroke="url(#metal)" stroke-linecap="round">
    <line x1="22" y1="45" x2="40" y2="19" stroke-width="4.2"/>
    <line x1="42" y1="45" x2="24" y2="19" stroke-width="4.2"/>
  </g>

  <!-- left axe head -->
  <path d="M19.5 18.5
           C14 20.5, 12.3 25.7, 14.2 29.2
           C16 32.4, 21.3 32.7, 24.8 29.8
           L27 28.1
           L23.9 23.2
           Z"
        fill="url(#metal)" filter="url(#shadow)"/>

  <!-- right axe head -->
  <path d="M44.5 18.5
           C50 20.5, 51.7 25.7, 49.8 29.2
           C48 32.4, 42.7 32.7, 39.2 29.8
           L37 28.1
           L40.1 23.2
           Z"
        fill="url(#metal)" filter="url(#shadow)"/>

  <!-- bottom grip accents -->
  <g stroke="#FDE7D3" stroke-linecap="round" opacity="0.9">
    <line x1="20.6" y1="46.7" x2="24.2" y2="51.8" stroke-width="1.5"/>
    <line x1="39.8" y1="46.7" x2="43.4" y2="51.8" stroke-width="1.5"/>
  </g>

  <!-- subtle center diamond to keep legibility at 16px -->
  <rect x="28.8" y="27.8" width="6.4" height="6.4" rx="1.4" transform="rotate(45 32 31)" fill="#FFD7B0" opacity="0.95"/>
</svg>
